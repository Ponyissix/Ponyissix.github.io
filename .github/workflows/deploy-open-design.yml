name: deploy-open-design

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-open-design.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Open Design landing page
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Open Design source
        uses: actions/checkout@v6.0.2
        with:
          repository: Ponyissix/open-design
          ref: main
          path: source

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: source
        run: |
          version=$(node -p "require('./apps/landing-page/package.json').devDependencies.playwright.replace(/[^0-9.]/g,'')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache generated previews
        id: previews-cache
        uses: actions/cache@v5.0.5
        with:
          path: source/apps/landing-page/public/previews
          key: landing-page-previews-${{ runner.os }}-${{ hashFiles('source/pnpm-lock.yaml', 'source/package.json', 'source/apps/landing-page/package.json', 'source/apps/landing-page/scripts/generate-previews.ts', 'source/apps/landing-page/scripts/fallback-preview-card.ts', 'source/skills/**', 'source/design-templates/**', 'source/templates/live-artifacts/**', 'source/plugins/_official/**') }}
          restore-keys: |
            landing-page-previews-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        working-directory: source
        run: pnpm --filter @open-design/landing-page exec playwright install --with-deps chromium

      - name: Typecheck landing page
        working-directory: source
        run: pnpm --filter @open-design/landing-page typecheck

      - name: Generate skill and template previews
        if: steps.previews-cache.outputs.cache-hit != 'true'
        working-directory: source
        run: pnpm --filter @open-design/landing-page previews

      - name: Build landing page
        working-directory: source
        env:
          OD_LANDING_SITE: https://ponyissix.github.io
        run: pnpm --filter @open-design/landing-page build:static

      - name: Verify zero external JavaScript
        working-directory: source
        run: |
          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const html = readFileSync('apps/landing-page/out/index.html', 'utf8');
          const forbidden = [
            /<script\b[^>]*\bsrc=/i,
            /type=["']module["']/i,
            /\/_astro\/[^"'<>\s]+\.js/i,
          ];
          for (const pattern of forbidden) {
            if (pattern.test(html)) {
              console.error(`Unexpected client JavaScript matched ${pattern}`);
              process.exit(1);
            }
          }
          NODE

      - name: Verify homepage ships optimized WebP art
        working-directory: source
        run: |
          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const html = readFileSync('apps/landing-page/out/index.html', 'utf8');
          const webpRefs = html.match(/\/[A-Za-z0-9/_-]+\.webp/g) ?? [];
          if (webpRefs.length < 16) {
            console.error(`Expected at least 16 optimized WebP image references, found ${webpRefs.length}`);
            process.exit(1);
          }
          if (/(?:src|content)=["']\/assets\/[A-Za-z0-9_.-]+\.png/.test(html)) {
            console.error('Found local /assets/*.png image reference in generated landing HTML.');
            process.exit(1);
          }
          NODE

      - name: Verify deploy file count
        working-directory: source
        run: |
          count=$(find apps/landing-page/out -type f | wc -l | tr -d '[:space:]')
          echo "landing-page deploy file count: $count"
          if [ "$count" -ge 19000 ]; then
            echo "::error::landing-page build emitted $count files; reduce page fan-out before deploying."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: source/apps/landing-page/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
